        <nav id="mobile-menu">

            </ul>

        </div>

    </header>
    <main>
        <div class="page-header" data-aos="fade-down">
            <h1>Book here</h1>
            <p> Want to book an appointment? Feel free to reach out to us. You can contact us through the following methods:</p>
           </div>
           <article>
            <form class="contact-form" method="POST" data-netlify="true" data-aos="fade-up">
  <input type="hidden" name="form-name" value="booking" />

  <h2>Book an Appointment</h2>

  <div class="form-group">
    <label for="name">Full Name</label>
    <input id="name" name="name" type="text" placeholder="Your full name" required />
  </div>

  <div class="form-group">
    <label for="email">Email</label>
    <input id="email" name="email" type="email" placeholder="you@example.com" required />
  </div>

  <div class="form-group">
    <label for="phone">Phone Number</label>
    <input id="phone" name="phone" type="tel" placeholder="e.g. 071 234 5678" required />
  </div>

  <div class="form-group">
    <label for="service">Service</label>
    <select id="service" name="service" required>
      <option value="">Select a service</option>
      <option value="cut">Haircut</option>
      <option value="cut-beard">Haircut & Beard</option>
      <option value="beard">Beard Trim</option>
      <option value="kids">Kids Cut</option>
    </select>
  </div>

  <div class="form-group">
    <label for="date">Preferred Date</label>
    <input id="date" name="date" type="date" required />
  </div>

  <div class="form-group">
    <label for="time">Preferred Time</label>
    <input id="time" name="time" type="time" required />
  </div>

  <div class="form-group">
    <label for="notes">Additional Notes (optional)</label>
    <textarea
      id="notes"
      name="notes"
      placeholder="Any special requests?"
      rows="4"
    ></textarea>
  </div>

  <button type="submit">Request Booking</button>
</form>

           </article>
           </main>
